name: stevenluu-monorepo

networks:
  appnet:
    driver: bridge

volumes:
  ollama_data:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Cloudflare Tunnel: makes an OUTBOUND connection to Cloudflare's edge, so the
  # public DNS points at Cloudflare (hiding the home IP) and no inbound router
  # ports need to be open. Shares appnet, so it routes to each app by its Docker
  # service name — see the public-hostname table in cloudflare-tunnel.md.
  # The token is a secret; it lives in .env on the NAS, never committed.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    networks: [appnet]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    mem_limit: 256m
    logging: *default-logging

  # Auto-updates the 7 labeled app services below when CI pushes a new image
  # to ghcr.io — reuses Container Manager's existing ghcr.io registry login via
  # the mounted Docker socket, no separate credentials needed. Deliberately not
  # applied to ollama (large, never re-pushed) or cloudflared (infra we want to
  # update deliberately, not on autopilot). See cloudflare-tunnel.md's neighbor,
  # this file's own comments, and the root README's "Continuous deployment"
  # section for the full picture.
  #
  # The HTTP API (port 8080) lets you force an immediate check instead of
  # waiting out the poll interval — see deploy/synology/README.md for the curl
  # command. It is NOT routed through the Cloudflare Tunnel and nothing
  # forwards it on the router, so it's reachable only from the LAN.
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports: ["8080:8080"]
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=1800
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN}
    mem_limit: 128m
    logging: *default-logging

  portfolio:
    image: ghcr.io/sluu1122/portfolio:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["3000:3000"]
    mem_limit: 512m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]

  react-dashboard:
    image: ghcr.io/sluu1122/react-dashboard:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["8081:80"]
    mem_limit: 128m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]

  angular-dashboard:
    image: ghcr.io/sluu1122/angular-dashboard:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["8082:80"]
    mem_limit: 128m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]
    environment:
      - CPT_API_URL=${CPT_API_URL}
      - ICD_API_URL=${ICD_API_URL}
      - AI_API_URL=${AI_API_URL}
      - PATIENTS_API_URL=${PATIENTS_API_URL}
      - PORTFOLIO_URL=${PORTFOLIO_URL}
    depends_on: [ai-api, cpt-api, icd-api, patients-api]

  ai-api:
    image: ghcr.io/sluu1122/ai-api:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["3001:3001"]
    mem_limit: 512m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]
    environment:
      - PORT=3001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - OLLAMA_URL=http://ollama:11434
      - MODEL=qwen2.5-coder:1.5b
    depends_on: [ollama]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  cpt-api:
    image: ghcr.io/sluu1122/cpt-api:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["3002:3002"]
    mem_limit: 256m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]
    environment:
      - PORT=3002
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  icd-api:
    image: ghcr.io/sluu1122/icd-api:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["3003:3003"]
    mem_limit: 256m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]
    environment:
      - PORT=3003
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  patients-api:
    image: ghcr.io/sluu1122/patients-api:latest
    restart: unless-stopped
    networks: [appnet]
    ports: ["3004:3004"]
    mem_limit: 256m
    logging: *default-logging
    labels: ["com.centurylinklabs.watchtower.enable=true"]
    environment:
      - PORT=3004
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Local LLM backing ai-api's AI-assist features. Capped well below the NAS's
  # total RAM so it can never starve the other 6 services or DSM itself; CPU-only
  # inference on the DS423+'s Celeron is expected to be slow, not a stability risk.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks: [appnet]
    volumes:
      - ollama_data:/root/.ollama
    mem_limit: 6g
    logging: *default-logging

  # One-shot: waits for ollama to be ready, then pulls the model ai-api expects.
  # Replaces ai-api's own `postinstall` (suppressed at image build time via
  # --ignore-scripts, since it assumes a local Ollama binary that isn't present then).
  ollama-init:
    image: ollama/ollama:latest
    networks: [appnet]
    depends_on: [ollama]
    restart: "no"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do sleep 2; done;
       ollama pull qwen2.5-coder:1.5b"
