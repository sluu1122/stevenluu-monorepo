server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Content-hashed build assets — safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The HTML shell references the hashed bundles by name, so it must be
  # revalidated on every load — otherwise browsers (notably iOS WebKit)
  # heuristically cache it and never pick up a new deploy without a hard refresh.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
