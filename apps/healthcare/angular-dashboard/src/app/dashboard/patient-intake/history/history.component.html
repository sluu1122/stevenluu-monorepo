<div class="head">
  <h3 class="title">History</h3>
  <div class="head-right">
    @if (expanded()) {
      <button class="icon-btn" (click)="collapse.emit()" aria-label="Collapse to default view">
        <span class="icon">close_fullscreen</span>
      </button>
    } @else {
      <button class="icon-btn" (click)="expand.emit()" aria-label="Expand to full view">
        <span class="icon">open_in_full</span>
      </button>
    }
  </div>
</div>
<div class="history-body">
  @for (group of history; track group.date) {
    <div class="history-group">
      <div class="history-date-sep">{{ group.date }}</div>
      @for (event of group.events; track event.time; let last = $last) {
        <div class="history-item">
          <div class="history-rail">
            <span class="history-dot" [style.background]="event.dot" aria-hidden="true"></span>
            @if (!last) {
              <span class="history-line" aria-hidden="true"></span>
            }
          </div>
          <div class="history-content" [class.history-content--last]="last">
            <div class="history-text">{{ event.text }}</div>
            <div class="history-meta"><span class="mono">{{ event.time }}</span> · {{ event.actor }}</div>
          </div>
        </div>
      }
    </div>
  }
</div>
