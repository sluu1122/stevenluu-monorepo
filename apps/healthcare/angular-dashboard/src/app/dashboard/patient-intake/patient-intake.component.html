<div class="pi-view">
  @if (store.loading()) {
    <div class="app-loading" aria-live="polite">
      <span class="icon app-spin" aria-hidden="true">progress_activity</span>Loading intake case…
    </div>
  } @else if (store.error()) {
    <div class="app-error-banner app-error-banner--boxed" role="alert">
      <span class="icon icon--filled" aria-hidden="true">error</span>
      {{ store.error() }}
      <button pButton [text]="true" type="button" (click)="store.loadCase()">Retry</button>
    </div>
  }
  <div class="pi-view__workspace" [class.pi-view__workspace--has-expanded]="expandedCard() !== null">

    <div class="pi-view__top-half" [class.pi-view__top-half--hidden]="expandedCard() !== null">
      <div class="pi-view__card pi-view__card--patient">
        <app-pi-patient-details />
      </div>
      <div class="pi-view__card pi-view__card--insurance">
        <app-pi-patient-insurance />
      </div>
    </div>

    <div class="pi-view__bottom-half" [class.pi-view__bottom-half--tracker-gone]="expandedCard() !== null">
      <div class="pi-view__card pi-view__card--tracker" [class.is-collapsing]="expandedCard() !== null">
        <app-pi-intake-status />
      </div>
      <div class="pi-view__right-col"
           [class.pi-view__right-col--notes-expanded]="expandedCard() === 'notes'"
           [class.pi-view__right-col--history-expanded]="expandedCard() === 'history'">
        <div class="pi-view__card pi-view__card--notes" [class.is-collapsing]="expandedCard() === 'history'">
          <app-pi-notes [expanded]="expandedCard() === 'notes'" (expand)="expand('notes')" (collapse)="collapse()" />
        </div>
        <div class="pi-view__card pi-view__card--history" [class.is-collapsing]="expandedCard() === 'notes'">
          <app-pi-history [expanded]="expandedCard() === 'history'" (expand)="expand('history')" (collapse)="collapse()" />
        </div>
      </div>
    </div>

  </div>
</div>
