server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Runtime config is fetched fresh on every load — never cache it.
  # (Exact match wins over the regex and prefix locations below.)
  location = /assets/config.json {
    add_header Cache-Control "no-store";
  }

  # Content-hashed build output — safe to cache forever. The main-*.js /
  # styles-*.css bundles (outputHashing: all) and the hashed media/ dir are
  # all fingerprinted; favicon.ico and static assets/ files are NOT, so they
  # stay under the revalidating `location /` below.
  location ~* \.(?:js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
  location /media/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # The HTML shell references the hashed bundles by name, so it must be
  # revalidated on every load — otherwise browsers (notably iOS WebKit)
  # heuristically cache it and never pick up a new deploy without a hard refresh.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
