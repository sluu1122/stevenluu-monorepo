name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check-types
      - run: npm run lint
      - run: npm run build

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: portfolio
            dockerfile: apps/portfolio/Dockerfile
            build-args: |
              NEXT_PUBLIC_ANGULAR_SANDBOX_URL=https://angular.stevenluu.com
              NEXT_PUBLIC_REACT_SANDBOX_URL=https://react.stevenluu.com
          - name: react-dashboard
            dockerfile: apps/finance/react-dashboard/Dockerfile
          - name: angular-dashboard
            dockerfile: apps/healthcare/angular-dashboard/Dockerfile
          - name: ai-api
            dockerfile: apps/healthcare/ai-api/Dockerfile
          - name: cpt-api
            dockerfile: apps/healthcare/cpt-api/Dockerfile
          - name: icd-api
            dockerfile: apps/healthcare/icd-api/Dockerfile
          - name: patients-api
            dockerfile: apps/healthcare/patients-api/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: ${{ matrix.build-args || '' }}
          tags: |
            ghcr.io/sluu1122/${{ matrix.name }}:latest
            ghcr.io/sluu1122/${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
